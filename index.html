<!DOCTYPE html>
<!-- تعريف نوع المستند: يخبر المتصفح أننا نستخدم HTML5 -->
<html lang="en">
<!-- تحديد لغة الصفحة، ويمكنك تغييرها إلى "ar" إذا أردت -->

<head>
    <meta charset="UTF-8">
    <!-- تحديد ترميز النص ليظهر المحتوى العربي بشكل صحيح -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- يجعل التصميم متجاوبًا مع شاشات الجوال -->

    <title>محاذاة العناصر على المحور المتعامد (Cross Axis)</title>
    <!-- عنوان الصفحة الذي يظهر في تبويب المتصفح -->

    <link rel="stylesheet" href="style.css">
    <!-- ربط ملف CSS الخارجي الذي يحتوي على التنسيقات -->
</head>

<body>
    <!-- بداية محتوى الصفحة -->

    <div class="user-card">
        <!-- الحاوية الأساسية لبطاقة المستخدم، سيتم تطبيق Flexbox عليها -->

        <img src="avatar.jpg" class="avatar">
        <!-- صورة المستخدم - سيتم تنسيقها من خلال كلاس avatar -->

        <div class="info">
            <!-- قسم المعلومات النصية الخاصة بالمستخدم -->

            <h3>أحمد زعكان</h3>
            <!-- اسم المستخدم -->

            <p class="role">مطور واجهات أمامية</p>
            <!-- الوظيفة أو الدور -->

            <div class="status">
                <!-- حالة المستخدم (متصل / غير متصل) -->

                <span class="dot"></span>
                <!-- نقطة خضراء صغيرة تشير إلى أن المستخدم متصل -->

                <span>متصل الآن</span>
                <!-- نص الحالة -->
            </div>
        </div>

        <button class="contact-btn">تواصل</button>
        <!-- زر للتواصل مع المستخدم -->
    </div>

</body>
</html>
